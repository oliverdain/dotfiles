- name: Setup the ngrok apt repo
  deb822_repository:
    name: ngrok
    types: deb
    uris: https://ngrok-agent.s3.amazonaws.com
    # out of date for Bookworm but that's what they've got and it seems to work
    suites: buster
    components:
      - main
    signed_by: https://ngrok-agent.s3.amazonaws.com/ngrok.asc
    state: present
  become: true
- name: Setup the Syncthing apt repo
  deb822_repository:
    name: syncthing
    types: deb
    uris: https://apt.syncthing.net
    signed_by: https://syncthing.net/release-key.gpg
    suites: syncthing
    components:
      - stable
    state: present
  become: true
- name: use syncthing from their repo, not the official repo
  copy:
    dest: /etc/apt/preferences.d/syncthing.pref
    content: |
      Package: *
      Pin: origin apt.syncthing.net
      Pin-Priority: 990
  become: true
- name: install some standard packages
  apt:
     update_cache: true
     pkg:
       - curl
       - ripgrep
       - fd-find
       - ranger
       - htop
       - python3-pynvim
       - xclip
       - httpie
       - tig
       - ffmpeg
       - mpv
       - ngrok
       - syncthing
       # python3-dev installs the Python headers and things which my vimspector setup needs to install debugpy.
       - python3-dev
       - buildah
       - podman
       # If using Wayland you need this to get clipboard integration with neovim working.
       - wl-clipboard
  become: true
  tags: [ std-pkg ]
- name: symlink fdfind to fd
  file:
    src: /usr/bin/fdfind
    dest: /usr/bin/fd
    state: link
  become: true
- name: See if neovim is installed
  stat:
     path: "{{ nvim_path }}"
  register: nvim_stat
- name: check nvim version
  command: "{{ nvim_path }} --version"
  register: nvim_ver
  when: nvim_stat.stat.exists
- name: record whether nvim version is correct
  set_fact:
    nvim_version_correct: "{{ ('NVIM ' ~ nvim_version) in nvim_ver.stdout }}"
  when: nvim_stat.stat.exists
- name: mark nvim version incorrect if not installed
  set_fact:
    nvim_version_correct: false
  when: not nvim_stat.stat.exists
- name: Install neovim
  include_tasks: install_appimage.yml
  vars:
    app_name: nvim
    appimage_url: "https://github.com/neovim/neovim/releases/download/{{ nvim_version }}/nvim-linux-x86_64.appimage"
  when: not nvim_version_correct
- name: See if neovide is installed
  stat:
    path: "{{ neovide_path }}"
  register: neovide_stat
- name: check neovide version
  command: "{{ neovide_path }} --version"
  register: neovide_ver
  when: neovide_stat.stat.exists
- name: record whether neovide version is correct
  set_fact:
    neovide_version_correct: "{{ ('neovide ' ~ neovide_version) in neovide_ver.stdout }}"
  when: neovide_stat.stat.exists
- name: mark neovide version incorrect if not installed
  set_fact:
    neovide_version_correct: false
  when: not neovide_stat.stat.exists
- name: install neovide
  include_tasks: install_appimage.yml
  vars:
    app_name: neovide
    appimage_url: "https://github.com/neovide/neovide/releases/download/{{ neovide_version }}/neovide.AppImage"
  when: not neovide_version_correct
- name: ensure applications directory exists
  file:
    path: "{{ ansible_env.HOME }}/.local/share/applications"
    state: directory
  when: not neovide_version_correct
- name: install neovide desktop file
  copy:
    dest: "{{ ansible_env.HOME }}/.local/share/applications/neovide.desktop"
    content: |
      [Desktop Entry]
      Type=Application
      Exec={{ ansible_env.HOME }}/bin/neovide %F
      Icon={{ ansible_env.HOME }}/bin/neovide-app/neovide.svg
      Name=Neovide
      Keywords=Text;Editor;
      Categories=Utility;TextEditor;
      Comment=No Nonsense Neovim Client in Rust
      MimeType=text/english;text/plain;text/x-makefile;text/x-c++hdr;text/x-c++src;text/x-chdr;text/x-csrc;text/x-java;text/x-moc;text/x-pascal;text/x-tcl;text/x-tex;application/x-shellscript;text/x-c;text/x-c++;
  when: not neovide_version_correct
- name: Check if Volta is installed
  stat:
    path: "{{ volta_dir }}"
  register: volta_stat
- name: check volta version
  command: $HOME/.volta/bin/volta --version
  register: volta_ver
  when: volta_stat.stat.exists
- name: Install Volta
  # We skip the setup here - our YADM .profile adds the volta path
  shell: "curl https://get.volta.sh | bash -s -- --version {{ volta_version }} --skip-setup"
  when: not volta_stat.stat.exists or volta_ver.stdout != volta_version
# The main reason we use volta is to install a recent version of node.js for neovim to use.
- name: configure volta for nvim
  block:
    - name: install nodejs
      command: $HOME/.volta/bin/volta install node@22
- name: see if claude is installed
  stat:
    path: $HOME/.local/bin/claude 
  register: claude_stat
  tags: [ claude ]
- name: Install Claude Code
  command: "{{ role_path }}/files/claude-installer.sh"
  tags: [ claude ]
  when: not claude_stat.stat.exists
- name: See if lakectl is installed
  stat:
    path: ~/bin/lakectl
  register: lakectl_stat
  tags: [ lakectl ]
- name: See if lakectl is the right version
  command: ~/bin/lakectl --version
  register: lake_version_reg
  when: lakectl_stat.stat.exists
  tags: [ lakectl ]
# Now we have to parse the output of lakectl --version. If we don't find the right version the result will be the
# *string* -1. If we didn't even have lakectl installed at all we set the same fact to -1 below so that we know we need
# to install it if lake_version_correct == "-1".
- name: Extract lakectl version from stdout string
  set_fact:
    lake_version_correct: "{{ lake_version_reg.stdout.find('lakectl version: ' ~ lakefs_version ~ '\n') }}"
  when: lakectl_stat.stat.exists
  tags: [ lakectl ]
- name: Set lake_version_correct to -1 if lakectl isn't found at all
  set_fact:
    lake_version_correct: "-1"
  when: not lakectl_stat.stat.exists
  tags: [ lakectl ]
- name: Install lakefs CLI
  block:
    - name: Download lakefs tarball
      get_url:
        url: "https://github.com/treeverse/lakeFS/releases/download/v{{ lakefs_version }}/lakeFS_{{ lakefs_version }}_Linux_x86_64.tar.gz"
        dest: /tmp/lakefs.tar.gz
    - name: Extract lakefs cli
      unarchive:
        src: /tmp/lakefs.tar.gz
        include: lakectl
        dest: ~/bin
  when: lake_version_correct == "-1"
  tags: [ lakectl ]
- name: see if k9s is installed
  stat:
    path: /usr/bin/k9s
  register: k9s_stat
- name: install k9s TUI
  apt:
    deb: https://github.com/derailed/k9s/releases/latest/download/k9s_linux_amd64.deb
  become: true
  when: not k9s_stat.stat.exists
# Kubeswitch requires a tiny bit of bash to set up the shell function. That's already in my .bashrc in yadm so no need
# to do anything else here.
- name: see if kubeswitch is installed
  stat:
    path: ~/bin/switcher
  register: kubeswitch_stat
- name: install kubeswitch
  block:
    - name: download latest version of kubeswitch
      get_url:
        url: https://github.com/danielfoehrKn/kubeswitch/releases/latest/download/switcher_linux_amd64
        dest: ~/bin/switcher
    - name: make switcher executable
      file:
        path: ~/bin/switcher
        state: touch
        mode: u+x
  when: not kubeswitch_stat.stat.exists
- name: See if rclone is installed
  stat:
    path: /usr/bin/rclone
  register: rclone_stat
- name: Install rclone
  apt:
    deb: https://github.com/rclone/rclone/releases/download/v1.65.2/rclone-v1.65.2-linux-amd64.deb
  become: true
  when: not rclone_stat.stat.exists
# Debian ships with a very old version of fzf so we install the latest manually.
- name: see if fzf is installed
  stat:
    path: /usr/local/bin/fzf
  register: fzf_stat
- name: install the latest version of fzf
  block:
    - name: download fzf
      get_url:
        url: https://github.com/junegunn/fzf/releases/download/v0.66.0/fzf-0.66.0-linux_amd64.tar.gz
        dest: /tmp/fzf.tar.gz
    - name: extract fzf
      unarchive:
        src: /tmp/fzf.tar.gz
        include: fzf
        dest: /usr/local/bin
      become: true
  when: not fzf_stat.stat.exists
- name: get golang version
  command: /usr/local/go/bin/go version
  register: golang_check
  ignore_errors: true
  tags: [go]
- name: Download and install golang
  block:
    - name: Download golang
      get_url:
        url: https://golang.org/dl/{{go_version}}.linux-amd64.tar.gz
        dest: /tmp/{{go_version}}.tar.gz
    - name: remove any old versions of go
      file:
        path: /usr/local/go
        state: absent
      become: true
    - name: extract the golang tarball
      unarchive:
        src: /tmp/{{go_version}}.tar.gz
        dest: /usr/local
      become: true
  when: golang_check.rc != 0 or go_version not in golang_check.stdout
  tags: [go]
- name: see if witr is installed
  stat:
    path: ~/bin/witr
  register: witr_stat
- name: check witr version
  command: ~/bin/witr --version
  register: witr_ver
  when: witr_stat.stat.exists
- name: extract witr version from output
  set_fact:
    witr_version_correct: "{{ witr_ver.stdout.find(witr_version) }}"
  when: witr_stat.stat.exists
- name: set witr_version_correct to -1 if witr is not installed
  set_fact:
    witr_version_correct: "-1"
  when: not witr_stat.stat.exists
- name: install witr
  block:
    - name: download witr binary
      get_url:
        url: "https://github.com/pranshuparmar/witr/releases/download/{{ witr_version }}/witr-linux-amd64"
        dest: ~/bin/witr
    - name: make witr executable
      file:
        path: ~/bin/witr
        state: touch
        mode: u+x
  when: witr_version_correct == "-1"
- name: add go to the $PATH
  blockinfile:
    path: ~/.profile
    marker: "# {mark} ANSIBLE MANAGED for golang"
    block: export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin
    create: true
  tags: [go]

